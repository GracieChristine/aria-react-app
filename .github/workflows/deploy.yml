name: Deploy

on:
  push:
    branches:
      - main

# Client deploys automatically via Netlify's Git integration (netlify.toml)

jobs:
  deploy-server:
    name: Deploy Server → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
